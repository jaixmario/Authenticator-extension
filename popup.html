<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TOTP Authenticator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="setup-view" class="view hidden">
    <h2>Setup Authenticator</h2>
    <p>Enter the server URL to fetch your TOTP secrets, or add keys manually.</p>
    <div class="input-group">
      <input type="url" id="server-url-input" placeholder="https://example.com/keys.json">
      <button id="save-url-btn">Save URL</button>
      <button id="skip-setup-btn" style="background-color: var(--surface-color); color: var(--text-color);">Skip / Add Manually</button>
    </div>
    <div id="setup-error" class="error hidden"></div>
  </div>

  <div id="add-view" class="view hidden">
    <h2>Add Key Manually</h2>
    <div class="input-group">
      <input type="text" id="manual-name-input" placeholder="Nickname (e.g. Google)" required>
      <input type="text" id="manual-key-input" placeholder="Secret Key (Base32)" required>
      <button id="save-manual-btn">Add Key</button>
      <button id="cancel-manual-btn" style="background-color: var(--surface-color); color: var(--text-color);">Cancel</button>
    </div>
    <div id="add-error" class="error hidden"></div>
  </div>

  <div id="totp-view" class="view hidden">
    <div class="header">
      <h2>Authenticator</h2>
      <div class="header-buttons">
        <button id="refresh-btn" title="Refresh Server Keys">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-12.28l5.08 4.71"/></svg>
        </button>
        <button id="add-btn" title="Add Key Manually">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>
    
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    
    <ul id="totp-list" class="totp-list">
      <!-- Codes will be injected here -->
    </ul>
    <div id="totp-error" class="error hidden"></div>
  </div>

  <script src="js/base32.js"></script>
  <script src="js/totp.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
